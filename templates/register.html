{% extends "base.html" %}
{% block title %}Register | Fake News Shield{% endblock %}
{% block content %}
<section class="mx-auto max-w-xl py-10 lg:py-16">
    <div class="glass-card p-8 md:p-10">
        <div class="mb-8 space-y-3 text-center">
            <span class="inline-flex rounded-full border border-white/15 bg-white/8 px-4 py-2 text-sm text-brand-100">Secure onboarding</span>
            <h1 class="font-display text-3xl font-bold text-white">Create your account</h1>
            <p class="text-slate-300">Start analyzing news content and synthetic images in a single dashboard.</p>
        </div>
        <form method="POST" class="space-y-5">
            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-200">Username</label>
                <input type="text" name="username" required class="input-field" placeholder="Choose a username">
            </div>
            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-200">Email address</label>
                <input type="email" name="email" required class="input-field" placeholder="you@example.com">
            </div>
            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-200">Password</label>
                <input type="password" name="password" required class="input-field" placeholder="Create a password">
            </div>
            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-200">Confirm password</label>
                <input type="password" name="confirm_password" required class="input-field" placeholder="Repeat your password">
            </div>
            <button type="submit" class="primary-button w-full">Register</button>
        </form>
        <p class="mt-6 text-center text-sm text-slate-300">Already have an account? <a href="{{ url_for('login') }}" class="font-semibold text-brand-100 hover:text-white">Login here</a>.</p>
    </div>
</section>
{% endblock %}
